type: object
required:
  - summary
  - evidence
  - confidence
  - next_action
  - risk
properties:
  summary:
    type: string
    description: One-line conclusion or incident status.
  evidence:
    type: array
    items:
      type: string
    description: Concrete supporting facts such as logs, files, methods, or commands.
  confidence:
    type: string
    enum: [high, medium, low]
  next_action:
    type: string
  risk:
    type: string
  blast_radius:
    type: string
  validation:
    type: string
  follow_up:
    type: array
    items:
      type: string
